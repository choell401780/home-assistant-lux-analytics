name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify VERSION file matches tag
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version match confirmed: $FILE_VERSION"

      - name: Create release archive
        run: |
          zip -r "lux_analytics_v${{ steps.version.outputs.VERSION }}.zip" \
            custom_components/lux_analytics/ \
            dashboards/ \
            README.md \
            CHANGELOG.md \
            LICENSE \
            info.md

      - name: Resolve release notes path
        id: notes
        run: |
          NOTES="releases/v${{ steps.version.outputs.VERSION }}/release_notes.md"
          if [ -f "$NOTES" ]; then
            echo "path=$NOTES" >> $GITHUB_OUTPUT
          else
            echo "Lux Analytics v${{ steps.version.outputs.VERSION }}" > /tmp/fallback_notes.md
            echo "path=/tmp/fallback_notes.md" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lux Analytics v${{ steps.version.outputs.VERSION }}"
          body_path: "${{ steps.notes.outputs.path }}"
          files: "lux_analytics_v${{ steps.version.outputs.VERSION }}.zip"
          draft: false
          prerelease: false
